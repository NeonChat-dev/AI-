<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Чат — AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }

        .chat-window {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 32px 28px;
            max-width: 560px;
            width: 100%;
            min-height: 580px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
        }

        .top-menu {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1.5px solid #f1f5f9;
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-logo {
            font-weight: 700;
            font-size: 18px;
            color: #0f172a;
            letter-spacing: -0.3px;
        }

        .menu-logo span {
            color: #3b82f6;
        }

        .menu-badge {
            background: #eef2ff;
            color: #3b82f6;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-user {
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            background: #f1f5f9;
            padding: 4px 14px;
            border-radius: 40px;
        }

        .menu-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-icon:hover {
            background: #f1f5f9;
        }

        .menu-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 4px;
        }

        .menu-status {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .chat-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .chat-header .chat-status {
            font-size: 12px;
            color: #22c55e;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .secret-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            margin-left: 8px;
        }

        .chat-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            height: 340px;
            overflow-y: auto;
            margin-bottom: 14px;
            border: 1.5px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
            flex: 1;
        }

        .message {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            animation: fadeIn 0.25s ease;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-msg {
            background: #eef2ff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #1e293b;
        }

        .user-msg {
            background: #3b82f6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1.5px solid #e2e8f0;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #3b82f6;
        }

        .chat-input-area input:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        .chat-input-area button {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            white-space: nowrap;
        }

        .chat-input-area button:hover:not(:disabled) {
            background: #2563eb;
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-session {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
        }

        .no-session a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .chat-window {
                padding: 20px 16px 20px;
                border-radius: 24px;
                min-height: 480px;
            }

            .chat-box {
                height: 240px;
                padding: 12px;
            }

            .message {
                font-size: 13px;
                padding: 10px 14px;
            }

            .chat-header h2 {
                font-size: 17px;
            }

            .chat-input-area input {
                font-size: 14px;
                padding: 10px 14px;
            }

            .chat-input-area button {
                padding: 10px 18px;
                font-size: 14px;
            }

            .top-menu {
                flex-wrap: wrap;
                gap: 6px;
            }
        }
    </style>
</head>
<body>

<div class="chat-window" id="chatWindow">
    <!-- МЕНЮ -->
    <div class="top-menu">
        <div class="menu-left">
            <div class="menu-logo">AI<span>Chat</span></div>
            <div class="menu-badge">v2.4</div>
        </div>
        <div class="menu-right">
            <div class="menu-status"><span class="menu-dot"></span> Online</div>
            <div class="menu-user" id="currentUser">Гость</div>
            <div class="menu-icon" id="logoutBtn" title="Выйти">🚪</div>
        </div>
    </div>

    <div id="chatContent">
        <div class="chat-header">
            <h2>🧠 Нейросеть <span class="secret-badge" id="roleBadge">пользователь</span></h2>
            <div class="chat-status"><span class="menu-dot"></span> активна</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message ai-msg">Привет! Я — нейросеть DeepMind. Задавай любой вопрос, я проанализирую данные и дам ответ.</div>
            <div class="message ai-msg">⚠️ Ответы генерируются в реальном времени на основе глубинного обучения.</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Введите запрос..." disabled>
            <button id="sendBtn" disabled>Отправить</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ——— ПРОВЕРКА СЕССИИ ———
        const nick = sessionStorage.getItem('chat_nickname');
        if (!nick) {
            // Если нет сессии — перенаправляем на регистрацию
            window.location.href = 'register.html';
            return;
        }

        const isAdmin = sessionStorage.getItem('chat_role') === 'admin';

        // ——— ЭЛЕМЕНТЫ ———
        const currentUserSpan = document.getElementById('currentUser');
        const roleBadge = document.getElementById('roleBadge');
        const logoutBtn = document.getElementById('logoutBtn');
        const chatBox = document.getElementById('chatBox');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // ——— УСТАНОВКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ———
        currentUserSpan.textContent = nick;
        roleBadge.textContent = isAdmin ? '⚡ админ' : 'пользователь';

        // ——— АКТИВАЦИЯ ЧАТА ———
        function activateChat(enable) {
            chatInput.disabled = !enable;
            sendBtn.disabled = !enable;
            if (enable) chatInput.focus();
        }
        activateChat(true);

        // ——— ВЫХОД ———
        logoutBtn.addEventListener('click', function() {
            if (confirm('Выйти из чата?')) {
                sessionStorage.removeItem('chat_nickname');
                sessionStorage.removeItem('chat_role');
                window.location.href = 'register.html';
            }
        });

        // ——— ЧАТ (ПРАНК) ———
        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user-msg';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addAIMessage(text) {
            const div = document.createElement('div');
            div.className = 'message ai-msg';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleChatSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            addUserMessage(text);

            // Имитация загрузки
            const loading = document.createElement('div');
            loading.className = 'message ai-msg';
            loading.innerHTML = '⏳ <span style="color:#64748b;">Анализирую...</span>';
            chatBox.appendChild(loading);
            chatBox.scrollTop = chatBox.scrollHeight;

            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            setTimeout(() => {
                chatBox.removeChild(loading);

                // Запрос на ввод ответа
                const promptMsg = document.createElement('div');
                promptMsg.className = 'message ai-msg';
                promptMsg.style.border = '2px solid #f59e0b';
                promptMsg.style.background = '#fffbeb';
                promptMsg.innerHTML = `
                    🧠 <strong>Введи ответ от нейросети:</strong>
                    <span style="display:block;font-size:12px;color:#92400e;margin-top:4px;">(это видно только тебе)</span>
                `;
                chatBox.appendChild(promptMsg);
                chatBox.scrollTop = chatBox.scrollHeight;

                chatInput.placeholder = 'Введи ответ нейросети...';
                chatInput.value = '';
                sendBtn.textContent = 'Ответить';
                sendBtn.disabled = false;

                const replyHandler = function() {
                    const reply = chatInput.value.trim();
                    if (!reply) return;

                    // Удаляем промпт
                    const msgs = chatBox.querySelectorAll('.ai-msg');
                    for (let i = msgs.length - 1; i >= 0; i--) {
                        if (msgs[i].innerHTML.includes('Введи ответ от нейросети')) {
                            msgs[i].remove();
                            break;
                        }
                    }

                    addAIMessage(reply);
                    chatInput.value = '';
                    chatInput.placeholder = 'Введите запрос...';
                    sendBtn.textContent = 'Отправить';

                    sendBtn.onclick = handleChatSend;
                    chatInput.onkeydown = function(e) {
                        if (e.key === 'Enter') handleChatSend();
                    };

                    setTimeout(() => {
                        addAIMessage('📊 Ответ сгенерирован. Жду следующий вопрос.');
                    }, 500);

                    chatInput.focus();
                };

                sendBtn.onclick = replyHandler;
                chatInput.onkeydown = function(e) {
                    if (e.key === 'Enter') replyHandler();
                };

                chatInput.focus();

            }, 1500);
        }

        // Назначаем обработчики
        sendBtn.onclick = handleChatSend;
        chatInput.onkeydown = function(e) {
            if (e.key === 'Enter') handleChatSend();
        };

    })();
</script>

</body>
</html>
